name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check IPRL v2 license headers
        run: python3 scripts/check_license.py --check

  # Two-step re-approval discipline. Runs on every event: merge commits are
  # exempt by construction (a merge carries the change and the review stamp
  # together), and check_self_approval.py enumerates the range with
  # `git rev-list --no-merges`, so merges to main — or to any branch — pass
  # without a job-level skip. Skipping the job here would poison the chain:
  # GitHub propagates a skipped job through `needs` transitively.
  approval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check two-step requirement re-approval
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT" = pull_request ]; then
            RANGE="$BASE..HEAD"
          elif [ -n "$BEFORE" ] && ! echo "$BEFORE" | grep -q '^0*$' && git cat-file -e "$BEFORE" 2>/dev/null; then
            RANGE="$BEFORE..HEAD"
          else
            RANGE="$(git merge-base origin/main HEAD)..HEAD"
          fi
          python3 scripts/check_self_approval.py "$RANGE"

  build:
    runs-on: ubuntu-latest
    needs: [license, approval]
    # Every downstream job states its own condition on the actual results of
    # its needs instead of relying on implicit skip propagation. Tolerating
    # 'skipped' keeps the chain alive if an entry check ever becomes
    # conditional again; any failure still stops build-test-requirements.
    if: ${{ !cancelled() && needs.license.result == 'success' && contains(fromJSON('["success", "skipped"]'), needs.approval.result) }}
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-19 libboost-dev libboost-context-dev libboost-system-dev libboost-url-dev \
            libssl-dev libfontconfig-dev ninja-build pkg-config
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build-ci
          key: build-ci-clang19-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: build-ci-clang19-

      - name: Configure (CMake)
        run: >
          cmake -B build-ci -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19

      - name: Build unit tests
        run: |
          set -o pipefail
          cmake --build build-ci --target unit_tests --parallel 2>&1 | tee build-ci/build.log
      - name: Report build failure as a Check Run
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/report_build_failure.py build-ci/build.log

      # Jobs run on fresh runners: the built tree travels between jobs as a tarball
      # artifact (tar preserves the executable bits that upload-artifact strips).
      - name: Pack built tree
        run: >
          tar --zstd -cf build-tree.tar.zst
          --exclude=CMakeFiles --exclude='*-src' --exclude='*-subbuild' build-ci

      - name: Upload built tree
        uses: actions/upload-artifact@v4
        with:
          name: build-tree
          path: build-tree.tar.zst
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    # Explicit condition on build's result: without it a skipped job anywhere
    # up the chain (e.g. a conditional entry check) skips this job too, and
    # requirements then dies downloading the ctest-results artifact that was
    # never uploaded.
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download built tree
        uses: actions/download-artifact@v4
        with:
          name: build-tree

      - name: Unpack built tree
        run: tar --zstd -xf build-tree.tar.zst

      # Fresh runner: only the shared libs the test binaries link against at
      # runtime are needed here, not the toolchain used to build them.
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libboost-context-dev libboost-system-dev libboost-url-dev libssl-dev

      - name: Run unit tests (ctest, offline)
        env:
          REQ_COVERAGE_FILE: ${{ github.workspace }}/build-ci/req_coverage.jsonl
        run: |
          set -o pipefail
          ctest --test-dir build-ci -LE live --output-on-failure 2>&1 | tee build-ci/ctest.log
      - name: Report test failure as a Check Run
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/report_build_failure.py build-ci/ctest.log

      - name: Upload C++ coverage records
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: req-coverage-cpp
          path: build-ci/req_coverage.jsonl
          if-no-files-found: warn

  requirements:
    runs-on: ubuntu-latest
    needs: [build, test]
    # Runs even when the test job failed so failed requirements are published red;
    # skipped only when there is nothing to roll up (build failed or run cancelled).
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Single source of truth for requirements validation: ci/gate.sh bootstraps
      # .venv-req and runs `req validate` (structural + frozen-routine checks).
      - name: Validate requirements
        id: validate
        run: bash ci/gate.sh

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv ./actionlint /usr/local/bin/
      - name: Run requirements tooling tests (pytest)
        env:
          REQ_COVERAGE_FILE: ${{ github.workspace }}/pytest-coverage.jsonl
        run: .venv-req/bin/python -m pytest scripts/tests

      - name: Download C++ coverage records
        if: ${{ !cancelled() && steps.validate.outcome == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: req-coverage-cpp
          path: build-ci

      - name: Check coverage against the tree
        if: ${{ !cancelled() && steps.validate.outcome == 'success' }}
        run: >
          bash ci/gate.sh
          --coverage pytest-coverage.jsonl
          --coverage build-ci/req_coverage.jsonl

      - name: Compute recursive requirement status
        if: ${{ !cancelled() && steps.validate.outcome == 'success' }}
        run: >
          .venv-req/bin/python scripts/req.py report
          --coverage pytest-coverage.jsonl
          --coverage build-ci/req_coverage.jsonl
          --out req_status.json

      - name: Write requirements report to the job summary
        if: ${{ !cancelled() && steps.validate.outcome == 'success' }}
        run: .venv-req/bin/python ci/write_status_summary.py

      - name: Publish requirements tree as a Check Run
        if: ${{ !cancelled() && steps.validate.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .venv-req/bin/python scripts/publish_check_run.py --status req_status.json
