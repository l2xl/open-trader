header: Leaf-to-test binding
description: |
  Every test-bearing leaf item shall be bound to its covering test routines purely by structural tags -- the default binding by the `[UID]` tag alone, named bindings by the `[UID][binding_name]` tag pair -- with the routine's source location discovered from the tags at check time and never declared in the requirement file
