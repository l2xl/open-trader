header: Requirements status report
description: |
  The CI pipeline shall report the per-requirement implementation status computed recursively ([INFRA-044]) from the test run's results. The report is delivered as the rendered requirements tree ([INFRA-045]) with each bound test's result and log, directly on the run's report page and on the commit's checks -- not as a downloadable artifact.
