text: |
  Verification & requirements infrastructure (INFRA)

  This branch turns verification into an enforceable process: a one-command offline test run, deterministic async test helpers, an offline mock exchange harness, render snapshot regression, sanitizer and parser-robustness jobs, and a requirements tree whose every normative leaf is provably covered by a UID-tagged automated test and frozen by a user-approved review workflow. It is cross-cutting: every other branch's requirements become mechanically verifiable through this infrastructure.
